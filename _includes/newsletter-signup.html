
<div class="newsletter-box">


  <form id="workshopSignupForm">

    <div class="newsletter-grid">

      <label>
        First name
        <input 
          type="text" 
          name="first_name" 
          placeholder="First name">
      </label>

      <label>
        Last name
        <input 
          type="text" 
          name="last_name" 
          placeholder="Last name">
      </label>

    </div>

    <label>
      Email
      <input 
        type="email" 
        name="email" 
        placeholder="name@example.com" 
        required>
    </label>

    <!-- Honeypot anti-bot field -->
    <p style="display:none;">
      <label>
        Website
        <input 
          type="text" 
          name="website" 
          tabindex="-1" 
          autocomplete="off">
      </label>
    </p>

    <input 
      type="hidden" 
      name="started_at" 
      id="started_at">

    <button type="submit">
      Subscribe
    </button>

  </form>

  <div id="signupMessage" class="newsletter-message"></div>
</div>

<style>
.newsletter-box {
  max-width: 640px;
  padding: 1.6rem;
  margin: 1.8rem 0;
  border: 1px solid #ffffff;
  border-radius: 14px;
  background: #ffffff;
}

.newsletter-box h3 {
  margin-top: 0;
  margin-bottom: 0.35rem;
}

.newsletter-note {
  margin-top: 0;
  margin-bottom: 1.2rem;
  color: #555;
}

.newsletter-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.newsletter-box label {
  display: block;
  margin-bottom: 1rem;
  font-weight: 400;
}

.newsletter-box input {
  width: 100%;
  margin-top: 0.3rem;
  padding: 0.7rem 0.8rem;
  border: 1px solid #9a9a9a42;
  border-radius: 8px;
  font: inherit;
  box-sizing: border-box;
}

.newsletter-box input:focus {
  outline: none;
  border-color: #9a9a9a42;
  box-shadow: 0 0 0 3px rgba(75, 108, 183, 0.15);
}

.newsletter-box button {
  padding: 0.75rem 1.2rem;
  border: none;
  border-radius: 8px;
  background: #9a9a9a42;
  color: #232323b1;
  font: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease;
}

.newsletter-box button:hover {
  background: #9a9a9a42;
}

.newsletter-message {
  margin-top: 1rem;
  font-weight: 400;
}

@media (max-width: 600px) {
  .newsletter-grid {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
document.getElementById("started_at").value = Date.now();

document.getElementById("workshopSignupForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const message = document.getElementById("signupMessage");
  message.innerText = "Submitting...";

  const form = e.target;
  const formData = new FormData(form);

  formData.append("action", "subscribe");
  formData.append("source", window.location.pathname);

  try {

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbwzqsT0IXOl91n3VUh3F2cehaWeWWc7tT_QPpCUtEtKUIYtNkmM2bg8xlNyENuNCtuk/exec",
      {
        method: "POST",
        body: new URLSearchParams(formData)
      }
    );

    const data = await response.json();

    if (data.ok) {

      message.innerText =
        "Thank you. You have been subscribed.";

      form.reset();

      document.getElementById("started_at").value =
        Date.now();

    } else {

      message.innerText =
        data.error || "Something went wrong.";

    }

  } catch (err) {

    message.innerText =
      "Submission failed. Please try again later.";

  }

});
</script>
